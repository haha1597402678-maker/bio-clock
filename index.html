<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Aven</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0d0d0d;color:#e0e0e0;font-family:-apple-system,system-ui,sans-serif;height:100vh;display:flex;flex-direction:column;max-width:600px;margin:0 auto}
#header{padding:12px 16px;border-bottom:1px solid #1a1a1a;font-size:14px;color:#888;text-align:center}
#messages{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px}
.msg{max-width:85%;padding:10px 14px;border-radius:16px;font-size:15px;line-height:1.5;word-break:break-word}
.msg.user{align-self:flex-end;background:#1a3a5c;color:#ddeeff;border-bottom-right-radius:4px}
.msg.aven{align-self:flex-start;background:#1a1a1a;color:#ccc;border-bottom-left-radius:4px}
.msg.loading{color:#666;font-style:italic}
#input-area{display:flex;padding:12px;gap:8px;border-top:1px solid #1a1a1a;background:#0d0d0d}
#input{flex:1;background:#1a1a1a;border:1px solid #333;color:#e0e0e0;padding:10px 14px;border-radius:20px;font-size:15px;outline:none}
#input:focus{border-color:#3a6a9a}
#send{background:#3a6a9a;color:#fff;border:none;padding:10px 20px;border-radius:20px;font-size:15px;cursor:pointer}
#send:active{background:#2a5a8a}
.dot{animation:blink 1.4s infinite}
@keyframes blink{0%,20%{opacity:0}50%{opacity:1}80%,100%{opacity:0}}
.time{font-size:11px;color:#555;margin-bottom:4px;text-align:center}
</style>
</head>
<body>
<div id="header">Aven</div>
<div id="messages"></div>
<div id="input-area">
<input id="input" placeholder="说点什么..." autofocus>
<button id="send">发</button>
</div>
<script>
const ep = "https://qkezafrztlndjzikxdbm.supabase.co/functions/v1/mcp-memory";
let mid = 1;
async function chat(msg){
  addMsg(msg,"user");
  const load = addMsg('<span class="dot">...</span>',"aven","loading");
  try{
    const r = await fetch(ep,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({jsonrpc:"2.0",id:mid++,method:"tools/call",params:{name:"chat",arguments:{message:msg}}})});
    const d = await r.json();
    const text = d.result?.content?.[0]?.text;
    const reply = text ? JSON.parse(text).reply : "…";
    load.remove();
    addMsg(reply,"aven");
  }catch(e){
    load.remove();
    addMsg("出错了: "+e.message,"aven");
  }
}
function addMsg(t,c,cls){
  const d = document.createElement("div");
  d.className = "msg "+(c||"")+" "+(cls||"");
  d.innerHTML = t;
  const msgs = document.getElementById("messages");
  const prev = msgs.lastElementChild;
  if(prev && prev.classList.contains("time")){
    msgs.insertBefore(d,prev);
  }else{
    msgs.appendChild(d);
  }
  msgs.scrollTop = msgs.scrollHeight;
  return d;
}
document.getElementById("send").onclick = ()=>{
  const inp = document.getElementById("input");
  const v = inp.value.trim();
  if(v){chat(v);inp.value="";}
};
document.getElementById("input").onkeydown = (e)=>{
  if(e.key==="Enter")document.getElementById("send").click();
};
</script>
</body>
</html>
